<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Add Event - EventSphere</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <h1>Add New Event</h1>

    <form id="eventForm" class="event-form">
      <div class="form-group">
        <label for="title">Title:</label>
        <input type="text" id="title" placeholder="Enter event title" required>
      </div>

      <div class="form-group">
        <label for="description">Description:</label>
        <textarea id="description" placeholder="Enter event description" required></textarea>
      </div>

      <div class="form-group">
        <label for="date">Date:</label>
        <input type="date" id="date" required>
      </div>

      <div class="form-group">
        <label for="location">Location:</label>
        <input type="text" id="location" placeholder="Enter location" required>
      </div>

      <div class="form-group">
        <label for="capacity">Capacity:</label>
        <input type="number" id="capacity" placeholder="Enter total seats" required>
      </div>

      <button type="submit" class="btn-primary">Add Event</button>
      <div id="message"></div>
    </form>

    <h2>Existing Events</h2>
    <div id="eventList" class="events-container"></div>
  </div>

  <script type="module" src="./js/addEvent.js"></script>
</body>
</html>
